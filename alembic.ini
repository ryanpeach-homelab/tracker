# Alembic configuration for the tracker database.
#
# The database URL is not stored here; env.py reads it from the DATABASE_URI
# environment variable (the same variable the MCP server uses).

[alembic]
script_location = alembic
# Make the src/ layout importable so env.py can import tracker_mcp.models.
prepend_sys_path = src
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
